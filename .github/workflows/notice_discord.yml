on:
  deployment_status:

jobs:
  notify:
    if: github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Get commit message
        id: commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COMMIT_MSG=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.event.deployment.sha }}" \
            | jq -r '.commit.message' | head -5)
          COMMIT_MSG=$(echo "$COMMIT_MSG" | sed ':a;N;$!ba;s/\n/\\n/g' | sed 's/"/\\"/g')
          echo "message=$COMMIT_MSG" >> "$GITHUB_OUTPUT"

      - name: Notify Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"Preview Ready\",
                \"description\": \"**Branch:** ${{ github.event.deployment.ref }}\n**Commit:** ${{ steps.commit.outputs.message }}\n**URL:** ${{ github.event.deployment_status.target_url }}\",
                \"color\": 5025616
              }]
            }"
