on:
  deployment_status:

jobs:
  notify:
    if: github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Notify Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"Preview Ready\",
                \"description\": \"**Branch:** ${{ github.event.deployment.ref }}\n**URL:** ${{ github.event.deployment_status.target_url }}\",
                \"color\": 5025616
              }]
            }"
