name: "新機能リクエスト"
description: "新しいページ・コンポーネント・機能の追加リクエスト"
labels: ["feature"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: どんな機能を追加したいですか？
      placeholder: "例: ニュース記事にSNSシェアボタンを追加したい"
    validations:
      required: true
  - type: textarea
    id: purpose
    attributes:
      label: 目的・背景
      description: なぜこの機能が必要ですか？
      placeholder: "例: 記事を見た人が簡単にシェアできるようにしたい"
    validations:
      required: true
  - type: textarea
    id: approach
    attributes:
      label: 対応方針（案）
      description: 実装方法のアイデアがあれば記載してください（任意）
      placeholder: "例: react-share ライブラリを使ってTwitter/LINE共有ボタンを追加"
    validations:
      required: false
  - type: textarea
    id: references
    attributes:
      label: 参考ファイル
      description: 関連するファイルパスや参考URLがあれば（任意）
      placeholder: |
        - src/pages/SeminarPage.jsx
        - https://example.com
    validations:
      required: false
